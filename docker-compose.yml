services:
  ffmpeg-api:
    build: .
    image: ffmpeg-api:latest
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - DATA_ROOT=/data/render
    volumes:
      - ffmpeg-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ffmpeg-data:
