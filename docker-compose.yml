services:
  ffmpeg-api:
    build: .
    image: ffmpeg-api:latest
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.ffmpeg-api.loadbalancer.server.port=3000"
    environment:
      - PORT=3000
      - DATA_ROOT=/data/render
    volumes:
      - n8n-srcleads_ffmpeg_render:/data/render
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  n8n-srcleads_ffmpeg_render:
    external: true
